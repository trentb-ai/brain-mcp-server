# Perplexity direct-fetch worker (relocated from origin/main f08a769).
# Self-contained: talks to brain-public over HTTP via BRAIN_URL, no bindings/secrets.
# Deployed separately from the Claude.ai OAuth worker (brain-mcp-server) to avoid the
# worker-name collision. Deploy: npx wrangler deploy --config perplexity/wrangler.toml
name = "brain-mcp-perplexity"
main = "worker.ts"
compatibility_date = "2025-11-01"
# brain-public is a *.workers.dev on the same account; without this flag the subrequest
# is blocked same-zone (error 1042). This routes fetch() to the public internet.
compatibility_flags = ["global_fetch_strictly_public"]

[vars]
BRAIN_URL = "https://brain-public.trentbelasco.workers.dev"
